<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Image Host</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Arial, sans-serif;
  background:#f5f5f5;
}

nav{
  background:#111;
  color:white;
  padding:15px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap: 15px;
}

nav h1{
  font-size:22px;
}

.nav-right{
  display:flex;
  gap:15px;
  align-items:center;
  flex-wrap: wrap;
}

.nav-btn{
  border:none;
  padding:10px 15px;
  border-radius:8px;
  background:white;
  cursor:pointer;
  font-weight:bold;
}

.token-btn {
  background: #ffc107;
  color: #111;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.upload-box{
  background:white;
  border:3px dashed #888;
  border-radius:20px;
  padding:40px;
  text-align:center;
  transition:0.3s;
}

.upload-box.dragover{
  border-color:#0066ff;
  background:#eaf1ff;
}

.upload-box input{
  display:none;
}

.select-btn{
  margin-top:15px;
  border:none;
  padding:12px 20px;
  border-radius:10px;
  background:#0066ff;
  color:white;
  cursor:pointer;
  font-size:16px;
}

.progress-container{
  margin-top:20px;
  display:none;
}

.progress-bg{
  width:100%;
  height:28px;
  background:#ddd;
  border-radius:50px;
  overflow:hidden;
}

.progress-bar{
  width:0%;
  height:100%;
  background:#28a745;
  transition:0.3s;
}

.progress-text{
  margin-top:10px;
  font-weight:bold;
  text-align: center;
}

.output-box{
  background:white;
  padding:20px;
  margin-top:20px;
  border-radius:15px;
  word-break:break-all;
}

.output-box img{
  width:100%;
  max-width:350px;
  margin-top:15px;
  border-radius:15px;
  display: block;
}

.copy-btn{
  margin-top:15px;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}

.gallery{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:white;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  display: flex;
  flex-direction: column;
}

.card img{
  width:100%;
  height:220px;
  object-fit:cover;
}

.card-body{
  padding:15px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
}

.url-text{
  font-size:12px;
  margin-top:10px;
  word-break:break-all;
  color: #555;
}

.card-buttons{
  display:flex;
  gap:10px;
  margin-top:auto;
  padding-top: 15px;
}

.small-btn{
  flex:1;
  border:none;
  padding:10px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

.copy-small{
  background:#007bff;
}

.delete-small{
  background:#dc3545;
}

.hidden{
  display:none !important;
}

.empty-text{
  text-align:center;
  margin-top:30px;
  color:#666;
}
</style>
</head>
<body>

<nav>
  <h1>GitHub Image Host</h1>
  <div class="nav-right">
    <div id="storageText">Storage Used: 0.00 MB</div>
    <button class="nav-btn token-btn" onclick="updateTokenPrompt()">Set Token</button>
    <button class="nav-btn" onclick="showUpload()">Upload</button>
    <button class="nav-btn" onclick="showGallery()">Gallery</button>
  </div>
</nav>

<div class="container">
  <!-- UPLOAD SECTION -->
  <div id="uploadSection">
    <div class="upload-box" id="dropArea">
      <h2>Drag & Drop Image Here</h2>
      <p style="margin-top:10px;">OR</p>
      <input type="file" id="fileInput" accept="image/*">
      <button class="select-btn" onclick="document.getElementById('fileInput').click()">
        Select Image
      </button>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bg">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="output-box hidden" id="outputBox">
      <h3>Uploaded Successfully</h3>
      <div id="imageUrl" style="margin-top:10px; font-weight:bold;"></div>
      <button class="copy-btn" id="copyMainBtn">Copy URL</button>
      <br><br>
      <img id="previewImage" alt="Preview">
    </div>
  </div>

  <!-- GALLERY SECTION -->
  <div id="gallerySection" class="hidden">
    <h2>Uploaded Images</h2>
    <div class="gallery" id="gallery"></div>
    <div class="empty-text" id="emptyText">No Images Uploaded Yet</div>
  </div>
</div>

<script>
const GITHUB_USERNAME = "technow-byte";
const REPO_NAME = "image-url";
const BRANCH = "main";

// Retrieves token dynamically from browser storage to avoid immediate auto-revocation by GitHub
let TOKEN = localStorage.getItem("GH_UP_TOKEN") || "";

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const outputBox = document.getElementById("outputBox");
const imageUrl = document.getElementById("imageUrl");
const previewImage = document.getElementById("previewImage");
const copyMainBtn = document.getElementById("copyMainBtn");
const gallery = document.getElementById("gallery");
const emptyText = document.getElementById("emptyText");
const storageText = document.getElementById("storageText");

let latestUrl = "";

// TOKEN CONFIGURATION
function checkToken() {
  if (!TOKEN) {
    updateTokenPrompt();
  }
}

function updateTokenPrompt() {
  const userToken = prompt("Please enter your GitHub Personal Access Token (PAT):", TOKEN);
  if (userToken !== null) {
    TOKEN = userToken.trim();
    localStorage.setItem("GH_UP_TOKEN", TOKEN);
    loadGallery();
    updateStorage();
  }
}

// DRAG & DROP EVENTS
dropArea.addEventListener("dragover",(e)=>{
  e.preventDefault();
  dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave",()=>{
  dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop",(e)=>{
  e.preventDefault();
  dropArea.classList.remove("dragover");
  const files = e.dataTransfer.files;
  if(files.length){
    uploadImage(files[0]);
  }
});

fileInput.addEventListener("change",()=>{
  if(fileInput.files.length){
    uploadImage(fileInput.files[0]);
  }
});

// NAVIGATION
function showUpload(){
  document.getElementById("uploadSection").classList.remove("hidden");
  document.getElementById("gallerySection").classList.add("hidden");
}

function showGallery(){
  document.getElementById("uploadSection").classList.add("hidden");
  document.getElementById("gallerySection").classList.remove("hidden");
  loadGallery();
}

// ACTION BUTTON
copyMainBtn.addEventListener("click",()=>{
  if(!latestUrl) return;
  navigator.clipboard.writeText(latestUrl);
  copyMainBtn.innerText = "Copied!";
  setTimeout(()=>{
    copyMainBtn.innerText = "Copy URL";
  },2000);
});

// IMAGE UPLOAD INTERACTION
async function uploadImage(file){
  if(!TOKEN) {
    alert("Please set your GitHub Token using the 'Set Token' button first.");
    return;
  }
  if(!file.type.startsWith("image/")){
    alert("Only image files allowed");
    return;
  }

  progressContainer.style.display = "block";
  outputBox.classList.add("hidden");
  updateProgress(10);

  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async ()=>{
    try{
      updateProgress(30);
      const base64Data = reader.result.split(",")[1];
      const fileName = Date.now() + "_" + file.name.replace(/\s+/g,"_");
      const path = `uploads/${fileName}`;
      const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${path}`;

      updateProgress(50);

      const response = await fetch(apiUrl,{
        method:"PUT",
        headers:{
          "Authorization": `Bearer ${TOKEN}`,
          "Accept": "application/vnd.github+v3+json",
          "Content-Type":"application/json"
        },
        body:JSON.stringify({
          message:`Upload ${fileName}`,
          content:base64Data,
          branch:BRANCH
        })
      });

      if(!response.ok){
        const errData = await response.json();
        throw new Error(errData.message || "Upload failed");
      }

      updateProgress(100);

      const publicUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/${path}`;
      latestUrl = publicUrl;

      imageUrl.innerHTML = `<a href="${publicUrl}" target="_blank">${publicUrl}</a>`;
      previewImage.src = publicUrl;
      outputBox.classList.remove("hidden");

      setTimeout(() => {
        progressContainer.style.display = "none";
        updateProgress(0);
      }, 2000);

      updateStorage();
    }
    catch(error){
      console.error(error);
      alert("Upload failed: " + error.message);
      progressContainer.style.display = "none";
    }
  }
}

function updateProgress(percent){
  progressBar.style.width = percent + "%";
  progressText.innerText = percent + "%";
}

// GALLERY MANAGEMENT
async function loadGallery(){
  if(!TOKEN) return;
  try{
    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/uploads?ref=${BRANCH}`;
    const response = await fetch(url,{
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept": "application/vnd.github+v3+json"
      }
    });

    if(response.status === 404) {
      gallery.innerHTML = "";
      emptyText.style.display = "block";
      return;
    }

    if(!response.ok) throw new Error("Could not fetch gallery items");

    const files = await response.json();
    gallery.innerHTML = "";

    if(!Array.isArray(files) || files.length === 0){
      emptyText.style.display = "block";
      return;
    }

    emptyText.style.display = "none";
    // Sort array copies to place recent files at the top
    const extendedFiles = [...files].reverse();

    extendedFiles.forEach(file=>{
      if(file.type === "dir") return; // Skip directories if any
      
      const publicUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/uploads/${file.name}`;
      const card = document.createElement("div");
      card.className = "card";
      card.innerHTML = `
        <img src="${publicUrl}" alt="Gallery image">
        <div class="card-body">
          <strong style="word-break: break-all;">${file.name}</strong>
          <div class="url-text">${publicUrl}</div>
          <div class="card-buttons">
            <button class="small-btn copy-small">Copy</button>
            <button class="small-btn delete-small">Delete</button>
          </div>
        </div>
      `;

      const copyBtn = card.querySelector(".copy-small");
      const deleteBtn = card.querySelector(".delete-small");

      copyBtn.addEventListener("click",()=>{
        navigator.clipboard.writeText(publicUrl);
        copyBtn.innerText = "Copied!";
        setTimeout(()=>{ copyBtn.innerText = "Copy"; },1500);
      });

      deleteBtn.addEventListener("click",async ()=>{
        if(confirm("Delete this image permanently?")) {
          await deleteImage(file.name, file.sha);
        }
      });

      gallery.appendChild(card);
    });
  }
  catch(error){
    console.error(error);
  }
}

// REMOVE ASSETS FROM REPOSITORY
async function deleteImage(fileName,sha){
  try{
    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/uploads/${fileName}`;
    const response = await fetch(url,{
      method:"DELETE",
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Content-Type":"application/json",
        "Accept": "application/vnd.github+v3+json"
      },
      body:JSON.stringify({
        message:`Delete ${fileName}`,
        sha:sha,
        branch:BRANCH
      })
    });

    if(!response.ok) throw new Error("Deletion failed");

    loadGallery();
    updateStorage();
  }
  catch(error){
    console.error(error);
    alert("Delete failed: " + error.message);
  }
}

// STORAGE TRACKING
async function updateStorage(){
  if(!TOKEN) return;
  try{
    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/uploads?ref=${BRANCH}`;
    const response = await fetch(url,{
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept": "application/vnd.github+v3+json"
      }
    });

    let totalBytes = 0;
    if(response.ok){
      const files = await response.json();
      if(Array.isArray(files)){
        files.forEach(file=>{
          if(file.size) totalBytes += file.size;
        });
      }
    }
    const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
    storageText.innerText = `Storage Used: ${totalMB} MB`;
  }
  catch(error){
    console.error(error);
  }
}

// Initialization Sequence
window.addEventListener("DOMContentLoaded", () => {
  checkToken();
  loadGallery();
  updateStorage();
});
</script>
</body>
</html>
