<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitHub Image Host</title>
<style>
:root {
  /* Dark Mode Palette (Default) */
  --bg-primary: #0f172a;
  --bg-secondary: #1e293b;
  --bg-card: #334155;
  --border-color: #475569;
  --accent: #3b82f6;
  --accent-hover: #2563eb;
  --text-main: #f8fafc;
  --text-muted: #94a3b8;
  --success: #10b981;
  --danger: #ef4444;
  --warning: #f59e0b;
}

[data-theme="light"] {
  /* Light Mode Palette Override */
  --bg-primary: #f1f5f9;
  --bg-secondary: #ffffff;
  --bg-card: #f8fafc;
  --border-color: #cbd5e1;
  --accent: #3b82f6;
  --accent-hover: #1d4ed8;
  --text-main: #0f172a;
  --text-muted: #64748b;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg-primary);
  color: var(--text-main);
  line-height: 1.5;
  transition: background 0.3s ease, color 0.3s ease;
}

/* NAVBAR SYSTEM */
nav {
  background: var(--bg-secondary);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: relative;
  border-bottom: 1px solid var(--border-color);
  z-index: 100;
  transition: background 0.3s ease, border-color 0.3s ease;
}

.logo {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text-main);
  cursor: pointer;
  user-select: none;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  background: none;
  border: none;
  cursor: pointer;
  padding: 5px;
}

.hamburger span {
  width: 25px;
  height: 3px;
  background: var(--text-main);
  border-radius: 2px;
  transition: 0.3s;
}

.nav-right {
  display: flex;
  gap: 15px;
  align-items: center;
}

#storageText {
  font-size: 13px;
  background: rgba(148, 163, 184, 0.1);
  padding: 6px 14px;
  border-radius: 20px;
  color: var(--text-muted);
  border: 1px solid rgba(148, 163, 184, 0.15);
}

.nav-btn {
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  font-weight: 600;
  font-size: 14px;
  transition: all 0.2s ease;
}

.nav-btn:hover, .nav-btn.active {
  color: var(--text-main);
  background: rgba(148, 163, 184, 0.15);
}

.token-btn {
  background: var(--warning) !important;
  color: #000 !important;
}

.token-btn:hover {
  opacity: 0.9;
}

/* THEME TOGGLE ICON SWITCH */
.theme-toggle {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--text-main);
  padding: 8px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}

.theme-toggle:hover {
  background: rgba(148, 163, 184, 0.15);
}

/* CONTAINER LAYOUT */
.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

/* UPLOAD CONTAINER SPACE */
.upload-box {
  background: var(--bg-secondary);
  border: 2px dashed var(--border-color);
  border-radius: 16px;
  padding: 60px 40px;
  text-align: center;
  transition: all 0.3s ease;
  cursor: pointer;
}

.upload-box:hover, .upload-box.dragover {
  border-color: var(--accent);
  background: rgba(59, 130, 246, 0.05);
}

.upload-box h2 {
  font-size: 22px;
  margin-bottom: 8px;
}

.upload-box p {
  color: var(--text-muted);
  font-size: 14px;
}

.upload-box input {
  display: none;
}

.select-btn {
  margin-top: 20px;
  border: none;
  padding: 12px 24px;
  border-radius: 8px;
  background: var(--accent);
  color: white;
  cursor: pointer;
  font-size: 15px;
  font-weight: 600;
  transition: 0.2s;
}

.select-btn:hover {
  background: var(--accent-hover);
}

/* TRACKABLE NATIVE PROGRESS */
.progress-container {
  margin-top: 30px;
  display: none;
  background: var(--bg-secondary);
  padding: 20px;
  border-radius: 12px;
}

.progress-bg {
  width: 100%;
  height: 10px;
  background: var(--bg-primary);
  border-radius: 50px;
  overflow: hidden;
}

.progress-bar {
  width: 0%;
  height: 100%;
  background: var(--success);
  transition: width 0.1s linear;
}

.progress-text {
  margin-top: 10px;
  font-weight: bold;
  font-size: 14px;
  text-align: center;
}

/* TARGET OUTPUT PANEL */
.output-box {
  background: var(--bg-secondary);
  padding: 24px;
  margin-top: 30px;
  border-radius: 16px;
  border: 1px solid var(--success);
}

.output-header {
  display: flex;
  align-items: center;
  gap: 10px;
  color: var(--success);
  font-weight: bold;
  margin-bottom: 15px;
}

.url-display-wrapper {
  display: flex;
  background: var(--bg-primary);
  padding: 10px 15px;
  border-radius: 8px;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

#imageUrl {
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-family: monospace;
  font-size: 13px;
}

#imageUrl a {
  color: var(--accent);
  text-decoration: none;
}

.copy-btn {
  border: none;
  padding: 8px 14px;
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--text-main);
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
}

.copy-btn:hover {
  opacity: 0.9;
}

.preview-container {
  display: flex;
  justify-content: center;
  background: var(--bg-primary);
  padding: 20px;
  border-radius: 12px;
}

.preview-container img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 8px;
  object-fit: contain;
}

/* REFACTORED VERTICAL PREVIEW GALLERY GRID */
.gallery-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 25px;
}

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 25px;
}

.card {
  background: var(--bg-secondary);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border: 1px solid var(--border-color);
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 12px 20px rgba(0,0,0,0.15);
}

.card-img-wrapper {
  width: 100%;
  height: 280px; /* Locked uniform height for all images */
  background: var(--bg-primary);
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 100%;
  object-fit: cover; /* Keeps image layouts vertical and proportional */
}

.card-body {
  padding: 16px;
  display: flex;
  flex-direction: column;
  flex-grow: 1;
  gap: 12px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-main);
}

.card-buttons {
  display: flex;
  gap: 10px;
  margin-top: auto;
}

.small-btn {
  flex: 1;
  border: none;
  padding: 10px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-size: 13px;
  transition: opacity 0.2s;
}

.small-btn:hover {
  opacity: 0.9;
}

.copy-small { background: var(--accent); }
.delete-small { background: var(--danger); }

.hidden { display: none !important; }

.empty-text {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 16px;
}

/* RESPONSIVE RESPONSIVENESS CAPABILITIES */
@media(max-width: 768px) {
  .hamburger {
    display: flex;
  }

  .nav-right {
    display: none;
    flex-direction: column;
    width: 100%;
    position: absolute;
    top: 100%;
    left: 0;
    background: var(--bg-secondary);
    padding: 20px;
    box-shadow: 0 10px 15px rgba(0,0,0,0.2);
    border-bottom: 1px solid var(--border-color);
    gap: 15px;
    align-items: stretch;
  }

  .nav-right.mobile-open {
    display: flex;
  }
  
  #storageText {
    text-align: center;
  }
}
</style>
</head>
<body>

<nav>
  <!-- Clicking logo redirects directly to Upload Space homepage view -->
  <div class="logo" onclick="showUpload()">GitDrive</div>
  
  <button class="hamburger" id="hamburgerBtn" aria-label="Toggle Navigation">
    <span></span>
    <span></span>
    <span></span>
  </button>
  
  <div class="nav-right" id="navDropdown">
    <div id="storageText">Storage Used: 0.00 MB</div>
    <button class="nav-btn token-btn" onclick="updateTokenPrompt()">Set Token</button>
    <button class="nav-btn active" id="menuUpload" onclick="showUpload()">Upload Space</button>
    <button class="nav-btn" id="menuGallery" onclick="showGallery()">Gallery View</button>
    
    <!-- Light/Dark System Switch Button -->
    <button class="theme-toggle" id="themeToggleBtn" title="Toggle Theme">
      <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
    </button>
  </div>
</nav>

<div class="container">
  <!-- UPLOAD SECTION -->
  <div id="uploadSection">
    <div class="upload-box" id="dropArea" onclick="document.getElementById('fileInput').click()">
      <h2>Drag & Drop Image Here</h2>
      <p>Supports PNG, JPG, GIF, WebP up to 10MB</p>
      <input type="file" id="fileInput" accept="image/*">
      <button class="select-btn" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">
        Browse Files
      </button>
    </div>

    <div class="progress-container" id="progressContainer">
      <div class="progress-bg">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <div class="progress-text" id="progressText">0%</div>
    </div>

    <div class="output-box hidden" id="outputBox">
      <div class="output-header">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"></polyline></svg>
        <span>Upload Processed Successfully</span>
      </div>
      <div class="url-display-wrapper">
        <div id="imageUrl"></div>
        <button class="copy-btn" id="copyMainBtn">Copy Link</button>
      </div>
      <div class="preview-container">
        <img id="previewImage" alt="Asset Preview">
      </div>
    </div>
  </div>

  <!-- GALLERY SECTION -->
  <div id="gallerySection" class="hidden">
    <h2 class="gallery-title">Cloud Archive Assets</h2>
    <div class="gallery" id="gallery"></div>
    <div class="empty-text" id="emptyText">No images found in your 'uploads' folder yet.</div>
  </div>
</div>

<script>
const GITHUB_USERNAME = "technow-byte";
const REPO_NAME = "images-url";
const BRANCH = "main";

// Initialize Local Token Engine 
let TOKEN = localStorage.getItem("GH_UP_TOKEN") || "";

const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const progressContainer = document.getElementById("progressContainer");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");
const outputBox = document.getElementById("outputBox");
const imageUrl = document.getElementById("imageUrl");
const previewImage = document.getElementById("previewImage");
const copyMainBtn = document.getElementById("copyMainBtn");
const gallery = document.getElementById("gallery");
const emptyText = document.getElementById("emptyText");
const storageText = document.getElementById("storageText");
const hamburgerBtn = document.getElementById("hamburgerBtn");
const navDropdown = document.getElementById("navDropdown");
const themeToggleBtn = document.getElementById("themeToggleBtn");
const themeIcon = document.getElementById("themeIcon");

let latestUrl = "";

// PERSISTED LIGHT / DARK MODE CONFIGURATION SYSTEM
const savedTheme = localStorage.getItem("app-theme") || "dark";
document.documentElement.setAttribute("data-theme", savedTheme);
updateThemeIcon(savedTheme);

themeToggleBtn.addEventListener("click", () => {
  const currentTheme = document.documentElement.getAttribute("data-theme");
  const newTheme = currentTheme === "light" ? "dark" : "light";
  document.documentElement.setAttribute("data-theme", newTheme);
  localStorage.setItem("app-theme", newTheme);
  updateThemeIcon(newTheme);
});

function updateThemeIcon(theme) {
  if (theme === "light") {
    // Render Moon Icon for toggling back to Dark
    themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
  } else {
    // Render Sun Icon for toggling back to Light
    themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
  }
}

// MOBILE HAMBURGER MENU INTERACTION
hamburgerBtn.addEventListener("click", () => {
  navDropdown.classList.toggle("mobile-open");
});

function closeMobileMenu() {
  navDropdown.classList.remove("mobile-open");
}

// TOKEN CONFIGURATION
function checkToken() {
  if (!TOKEN) {
    setTimeout(() => { updateTokenPrompt(); }, 500);
  }
}

function updateTokenPrompt() {
  const userToken = prompt("Please enter your current active GitHub Personal Access Token (PAT):", TOKEN);
  if (userToken !== null) {
    TOKEN = userToken.trim();
    localStorage.setItem("GH_UP_TOKEN", TOKEN);
    loadGallery();
    updateStorage();
  }
  closeMobileMenu();
}

// INTERACTION DRAG/DROP
dropArea.addEventListener("dragover",(e)=>{
  e.preventDefault();
  dropArea.classList.add("dragover");
});

["dragleave", "drop"].forEach(event => {
  dropArea.addEventListener(event, () => dropArea.classList.remove("dragover"));
});

dropArea.addEventListener("drop",(e)=>{
  e.preventDefault();
  const files = e.dataTransfer.files;
  if(files.length){
    uploadImage(files[0]);
  }
});

fileInput.addEventListener("change",()=>{
  if(fileInput.files.length){
    uploadImage(fileInput.files[0]);
  }
});

// ROUTING NAVIGATION / HOME VIEWS
function showUpload(){
  document.getElementById("uploadSection").classList.remove("hidden");
  document.getElementById("gallerySection").classList.add("hidden");
  document.getElementById("menuUpload").classList.add("active");
  document.getElementById("menuGallery").classList.remove("active");
  closeMobileMenu();
}

function showGallery(){
  document.getElementById("uploadSection").classList.add("hidden");
  document.getElementById("gallerySection").classList.remove("hidden");
  document.getElementById("menuUpload").classList.remove("active");
  document.getElementById("menuGallery").classList.add("active");
  loadGallery();
  closeMobileMenu();
}

// COPIER MECHANIC
copyMainBtn.addEventListener("click",()=>{
  if(!latestUrl) return;
  navigator.clipboard.writeText(latestUrl);
  copyMainBtn.innerText = "Copied link!";
  setTimeout(()=>{
    copyMainBtn.innerText = "Copy Link";
  },2000);
});

/* TRUE INTERACTIVE DATA STREAM UPLOAD PROCESSOR */
function uploadImage(file){
  if(!TOKEN) {
    alert("Please assign a valid active GitHub Token configuration using the 'Set Token' interface panel first.");
    updateTokenPrompt();
    return;
  }
  if(!file.type.startsWith("image/")){
    alert("Invalid asset syntax format configuration processing dropped.");
    return;
  }

  progressContainer.style.display = "block";
  outputBox.classList.add("hidden");
  updateProgress(0);

  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = function() {
    const base64Data = reader.result.split(",")[1];
    const fileName = Date.now() + "_" + file.name.replace(/\s+/g,"_");
    const path = `uploads/${fileName}`;
    const apiUrl = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/${path}`;

    const xhr = new XMLHttpRequest();
    xhr.open("PUT", apiUrl, true);
    
    xhr.setRequestHeader("Authorization", `Bearer ${TOKEN}`);
    xhr.setRequestHeader("Accept", "application/vnd.github+v3+json");
    xhr.setRequestHeader("Content-Type", "application/json");

    xhr.upload.onprogress = function(e) {
      if (e.lengthComputable) {
        const percentComplete = Math.round((e.loaded / e.total) * 100);
        updateProgress(Math.min(percentComplete, 95));
      }
    };

    xhr.onload = function() {
      if (xhr.status >= 200 && xhr.status < 300) {
        updateProgress(100);
        const publicUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/${path}`;
        latestUrl = publicUrl;

        imageUrl.innerHTML = `<a href="${publicUrl}" target="_blank">${publicUrl}</a>`;
        previewImage.src = publicUrl;
        outputBox.classList.remove("hidden");

        setTimeout(() => {
          progressContainer.style.display = "none";
          updateProgress(0);
        }, 1500);

        updateStorage();
      } else {
        let errMessage = "Bad Credentials / Expired Token Error.";
        try {
          const res = JSON.parse(xhr.responseText);
          errMessage = res.message || errMessage;
        } catch(e){}
        alert("Operation aborted: " + errMessage + "\n\nIf you pasted your token into a public chat or prompt, GitHub likely auto-revoked it. Please generate a new one.");
        progressContainer.style.display = "none";
      }
    };

    xhr.onerror = function() {
      alert("Network processing connectivity error encountered.");
      progressContainer.style.display = "none";
    };

    const payload = JSON.stringify({
      message: `Upload ${fileName}`,
      content: base64Data,
      branch: BRANCH
    });

    xhr.send(payload);
  };
}

function updateProgress(percent){
  progressBar.style.width = percent + "%";
  progressText.innerText = percent + "%";
}

// SEAMLESS RE-RENDERING GALLERY CONTROLLER (CLEAN VERBOSE UI)
async function loadGallery(){
  if(!TOKEN) return;
  try{
    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/uploads?ref=${BRANCH}`;
    const response = await fetch(url,{
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept": "application/vnd.github+v3+json"
      }
    });

    if(response.status === 404) {
      gallery.innerHTML = "";
      emptyText.style.display = "block";
      return;
    }

    if(!response.ok) throw new Error("Could not fetch repo assets list.");

    const files = await response.json();
    gallery.innerHTML = "";

    if(!Array.isArray(files) || files.length === 0){
      emptyText.style.display = "block";
      return;
    }

    emptyText.style.display = "none";
    const extendedFiles = [...files].reverse();

    extendedFiles.forEach(file=>{
      if(file.type === "dir" || file.name === ".gitkeep") return;
      
      const publicUrl = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/${BRANCH}/uploads/${file.name}`;
      const card = document.createElement("div");
      card.className = "card";
      
      // Clean UI layout: Image URLs removed from layout view blocks completely
      card.innerHTML = `
        <div class="card-img-wrapper">
          <img src="${publicUrl}" alt="Asset Preview" loading="lazy">
        </div>
        <div class="card-body">
          <div class="card-title" title="${file.name}">${file.name}</div>
          <div class="card-buttons">
            <button class="small-btn copy-small">Copy Link</button>
            <button class="small-btn delete-small">Delete</button>
          </div>
        </div>
      `;

      const copyBtn = card.querySelector(".copy-small");
      const deleteBtn = card.querySelector(".delete-small");

      copyBtn.addEventListener("click",()=>{
        navigator.clipboard.writeText(publicUrl);
        copyBtn.innerText = "Copied!";
        setTimeout(()=>{ copyBtn.innerText = "Copy Link"; },1500);
      });

      deleteBtn.addEventListener("click", async ()=>{
        if(confirm("Confirm action: Remove asset node from repository permanently?")) {
          await deleteImage(file.name, file.sha);
        }
      });

      gallery.appendChild(card);
    });
  }
  catch(error){
    console.error(error);
  }
}

// INSTANT ASSET REMOVAL ENGINE (NO REFRESH REQUIRED)
async function deleteImage(fileName, sha){
  try{
    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/uploads/${fileName}`;
    const response = await fetch(url,{
      method:"DELETE",
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Content-Type":"application/json",
        "Accept": "application/vnd.github+v3+json"
      },
      body:JSON.stringify({
        message: `Delete asset payload: ${fileName}`,
        sha: sha,
        branch: BRANCH
      })
    });

    if(!response.ok) {
      const parsedErr = await response.json();
      throw new Error(parsedErr.message || "File clear action breakdown.");
    }

    // Components state re-render seamlessly without requiring full window manual refreshes
    await loadGallery();
    await updateStorage();
  }
  catch(error){
    console.error(error);
    alert("Execution error structural fault: " + error.message);
  }
}

// CAPACITY STORAGE TRACKER
async function updateStorage(){
  if(!TOKEN) return;
  try{
    const url = `https://api.github.com/repos/${GITHUB_USERNAME}/${REPO_NAME}/contents/uploads?ref=${BRANCH}`;
    const response = await fetch(url,{
      headers:{
        "Authorization":`Bearer ${TOKEN}`,
        "Accept": "application/vnd.github+v3+json"
      }
    });

    let totalBytes = 0;
    if(response.ok){
      const files = await response.json();
      if(Array.isArray(files)){
        files.forEach(file=>{
          if(file.size) totalBytes += file.size;
        });
      }
    }
    const totalMB = (totalBytes / (1024 * 1024)).toFixed(2);
    storageText.innerText = `Storage Used: ${totalMB} MB`;
  }
  catch(error){
    console.error(error);
  }
}

// Initial Boot Sequence
window.addEventListener("DOMContentLoaded", () => {
  checkToken();
  loadGallery();
  updateStorage();
});
</script>
</body>
</html>
